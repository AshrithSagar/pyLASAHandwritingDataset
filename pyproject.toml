[project]
name = "pylasahandwritingdataset"
version = "0.1.0"
description = "LASA Handwriting dataset for Python3"
readme = "README.md"
authors = [{ name = "Ashrith Sagar", email = "ashrithy@iisc.ac.in" }]
requires-python = ">=3.13"
dependencies = ["numpy>=2.4.3", "scipy>=1.17.1"]

[build-system]
requires = ["uv_build>=0.10.10,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = ["scipy-stubs>=1.17.1.1"]
lint = ["ruff>=0.15.6"]
test = ["pytest>=9.0.2", "pytest-memray>=1.8.0"]
typecheck = [
    "basedpyright>=1.38.2",
    "mypy[mypyc]>=1.19.1",
    "pyrefly>=0.56.0",
    "pyright>=1.1.408",
    "ty>=0.0.23",
]
